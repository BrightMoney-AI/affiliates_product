<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPU Projections Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --surface-2: #1a2234;
    --border: #1e2d45;
    --text: #e2e8f0;
    --text-dim: #8892a4;
    --accent: #22d3a7;
    --accent-dim: rgba(34, 211, 167, 0.12);
    --red: #f45b69;
    --red-dim: rgba(244, 91, 105, 0.12);
    --blue: #60a5fa;
    --amber: #fbbf24;
    --purple: #a78bfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header h1 span {
    color: var(--accent);
  }

  .header .meta {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    padding: 24px 40px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }

  .kpi-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .kpi-card .value {
    font-size: 26px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -1px;
  }

  .kpi-card .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .positive { color: var(--accent); }
  .negative { color: var(--red); }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 0 40px 24px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
  }

  .chart-card.full {
    grid-column: 1 / -1;
  }

  .chart-card h3 {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 16px;
    color: var(--text-dim);
  }

  .chart-wrap {
    position: relative;
    height: 280px;
  }

  .chart-wrap.tall {
    height: 340px;
  }

  .table-section {
    padding: 0 40px 40px;
  }

  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .table-card h3 {
    font-size: 14px;
    font-weight: 500;
    padding: 18px 24px 0;
    color: var(--text-dim);
  }

  .table-wrap {
    overflow-x: auto;
    padding: 12px 24px 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  th {
    text-align: right;
    padding: 8px 12px;
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
  }

  th:first-child { text-align: left; }
  td { text-align: right; padding: 7px 12px; border-bottom: 1px solid var(--border); }
  td:first-child { text-align: left; color: var(--blue); }
  tr:hover td { background: var(--surface-2); }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }

  .pill.up { background: var(--accent-dim); color: var(--accent); }
  .pill.down { background: var(--red-dim); color: var(--red); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-size: 14px;
    color: var(--text-dim);
  }

  @media (max-width: 800px) {
    .charts-grid { grid-template-columns: 1fr; }
    .header, .kpi-row, .charts-grid, .table-section { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<div id="app" class="loading">Loading dashboard…</div>

<script>
const DATA_URL = './data/rpu_output.json';

async function init() {
  const resp = await fetch(DATA_URL);
  const data = await resp.json();
  const rows = data.rows.sort((a, b) => a.feo_cohort.localeCompare(b.feo_cohort));
  const generated = new Date(data.generated_at);
  const generatedIST = data.generated_at_ist || generated.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }) + ' IST';

  const latest = rows[rows.length - 1];
  const prev = rows[rows.length - 2] || latest;

  document.getElementById('app').className = '';
  document.getElementById('app').innerHTML = buildHTML(rows, latest, prev, generatedIST);

  renderCharts(rows);
}

function fmt(v, decimals = 4) {
  if (v == null || isNaN(v)) return '—';
  return v.toFixed(decimals);
}

function pct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v * 100).toFixed(1) + '%';
}

function buildHTML(rows, latest, prev, generatedIST) {
  // Recent 12 weeks for table
  const recent = rows.slice(-12).reverse();

  return `
    <div class="header">
      <div>
        <h1><span>RPU</span> Projection Dashboard</h1>
      </div>
      <div class="meta">
        Updated ${generatedIST}
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="label">Latest Cohort</div>
        <div class="value" style="color: var(--blue); font-size: 20px;">${latest.feo_cohort}</div>
      </div>
      <div class="kpi-card">
        <div class="label">Total Predicted RPU</div>
        <div class="value">${fmt(latest['Total Predicted'])}</div>
        <div class="sub">vs ${fmt(prev['Total Predicted'])} prior week</div>
      </div>
      <div class="kpi-card">
        <div class="label">Total Actual RPU</div>
        <div class="value">${fmt(latest['Total Actual'])}</div>
        <div class="sub">vs ${fmt(prev['Total Actual'])} prior week</div>
      </div>
      <div class="kpi-card">
        <div class="label">Delta</div>
        <div class="value ${latest['Delta (Actual - Predicted)'] >= 0 ? 'positive' : 'negative'}">
          ${fmt(latest['Delta (Actual - Predicted)'])}
        </div>
        <div class="sub">${pct(latest['Delta %'])} variance</div>
      </div>
      <div class="kpi-card">
        <div class="label">W1 Actual RPU</div>
        <div class="value">${fmt(latest['W1 RPU Actual'])}</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card full">
        <h3>Total RPU — Predicted vs Actual</h3>
        <div class="chart-wrap tall"><canvas id="chartTotal"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>W1 RPU — Predicted vs Actual</h3>
        <div class="chart-wrap"><canvas id="chartW1"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>W2-W4 RPU — Predicted vs Actual</h3>
        <div class="chart-wrap"><canvas id="chartW2"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>M3 RPU — Predicted vs Actual</h3>
        <div class="chart-wrap"><canvas id="chartM3"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Delta % (Actual - Predicted)</h3>
        <div class="chart-wrap"><canvas id="chartDelta"></canvas></div>
      </div>
    </div>

    <div class="table-section">
      <div class="table-card">
        <h3>Weekly Cohort Detail (Last 12 Weeks)</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Cohort</th>
                <th>W1 Pred</th><th>W1 Act</th>
                <th>W2-4 Pred</th><th>W2-4 Act</th>
                <th>M3 Pred</th><th>M3 Act</th>
                <th>Total Pred</th><th>Total Act</th>
                <th>Delta</th><th>Delta %</th>
              </tr>
            </thead>
            <tbody>
              ${recent.map(r => `
                <tr>
                  <td>${r.feo_cohort}</td>
                  <td>${fmt(r['W1 RPU Predicted'])}</td>
                  <td>${fmt(r['W1 RPU Actual'])}</td>
                  <td>${fmt(r['W2-4 RPU Predicted'])}</td>
                  <td>${fmt(r['W2-4 RPU Actual'])}</td>
                  <td>${fmt(r['M3 RPU Predicted'])}</td>
                  <td>${fmt(r['M3 RPU Actual'])}</td>
                  <td><b>${fmt(r['Total Predicted'])}</b></td>
                  <td><b>${fmt(r['Total Actual'])}</b></td>
                  <td>${fmt(r['Delta (Actual - Predicted)'])}</td>
                  <td><span class="pill ${r['Delta %'] >= 0 ? 'up' : 'down'}">${pct(r['Delta %'])}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderCharts(rows) {
  const labels = rows.map(r => r.feo_cohort);

  const commonOpts = {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { intersect: false, mode: 'index' },
    plugins: {
      legend: { display: true, position: 'top', labels: { color: '#8892a4', font: { size: 11, family: 'DM Sans' }, boxWidth: 12, padding: 12 } },
      tooltip: { backgroundColor: '#1a2234', titleColor: '#e2e8f0', bodyColor: '#e2e8f0', borderColor: '#1e2d45', borderWidth: 1, titleFont: { family: 'JetBrains Mono' }, bodyFont: { family: 'JetBrains Mono' }, padding: 10 }
    },
    scales: {
      x: { ticks: { color: '#8892a4', font: { size: 10, family: 'JetBrains Mono' }, maxRotation: 45 }, grid: { color: 'rgba(30,45,69,0.5)' } },
      y: { ticks: { color: '#8892a4', font: { size: 10, family: 'JetBrains Mono' } }, grid: { color: 'rgba(30,45,69,0.5)' } }
    }
  };

  // Total RPU
  new Chart(document.getElementById('chartTotal'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Predicted', data: rows.map(r => r['Total Predicted']), borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.08)', borderWidth: 2, tension: 0.3, pointRadius: 2 },
        { label: 'Actual', data: rows.map(r => r['Total Actual']), borderColor: '#22d3a7', backgroundColor: 'rgba(34,211,167,0.08)', borderWidth: 2, tension: 0.3, pointRadius: 2 },
      ]
    },
    options: commonOpts
  });

  // W1
  new Chart(document.getElementById('chartW1'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Predicted', data: rows.map(r => r['W1 RPU Predicted']), borderColor: '#a78bfa', borderWidth: 2, tension: 0.3, pointRadius: 1.5 },
        { label: 'Actual', data: rows.map(r => r['W1 RPU Actual']), borderColor: '#22d3a7', borderWidth: 2, tension: 0.3, pointRadius: 1.5 },
      ]
    },
    options: commonOpts
  });

  // W2-W4
  new Chart(document.getElementById('chartW2'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Predicted', data: rows.map(r => r['W2-4 RPU Predicted']), borderColor: '#a78bfa', borderWidth: 2, tension: 0.3, pointRadius: 1.5 },
        { label: 'Actual', data: rows.map(r => r['W2-4 RPU Actual']), borderColor: '#22d3a7', borderWidth: 2, tension: 0.3, pointRadius: 1.5 },
      ]
    },
    options: commonOpts
  });

  // M3
  new Chart(document.getElementById('chartM3'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Predicted', data: rows.map(r => r['M3 RPU Predicted']), borderColor: '#a78bfa', borderWidth: 2, tension: 0.3, pointRadius: 1.5 },
        { label: 'Actual', data: rows.map(r => r['M3 RPU Actual']), borderColor: '#22d3a7', borderWidth: 2, tension: 0.3, pointRadius: 1.5 },
      ]
    },
    options: commonOpts
  });

  // Delta %
  new Chart(document.getElementById('chartDelta'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Delta %',
        data: rows.map(r => (r['Delta %'] || 0) * 100),
        backgroundColor: rows.map(r => r['Delta %'] >= 0 ? 'rgba(34,211,167,0.6)' : 'rgba(244,91,105,0.6)'),
        borderRadius: 3,
      }]
    },
    options: {
      ...commonOpts,
      plugins: { ...commonOpts.plugins, legend: { display: false } },
      scales: {
        ...commonOpts.scales,
        y: { ...commonOpts.scales.y, ticks: { ...commonOpts.scales.y.ticks, callback: v => v + '%' } }
      }
    }
  });
}

init();
</script>
</body>
</html>
