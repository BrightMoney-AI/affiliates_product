<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPU Analytics Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1a;--surface:#111827;--surface2:#1a2332;--border:#1e2d45;
  --text:#e2e8f0;--dim:#8892a4;--accent:#22d3a7;--red:#f45b69;
  --blue:#60a5fa;--purple:#a78bfa;--amber:#fbbf24;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:8px;
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.header h1{font-size:1.25rem;font-weight:700;color:var(--text)}
.header .ts{font-family:var(--mono);font-size:.8rem;color:var(--dim)}

/* Tabs */
.tab-bar{display:flex;gap:2px;padding:8px 24px 0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.tab-btn{padding:10px 20px;font-family:var(--font);font-size:.85rem;font-weight:500;color:var(--dim);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Main */
.main{padding:20px 24px;max-width:1400px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.card h3{font-size:.9rem;font-weight:600;color:var(--dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.kpi .label{font-size:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi .value{font-size:1.5rem;font-weight:700;font-family:var(--mono)}
.kpi .change{font-size:.8rem;margin-top:4px}
.kpi .change.positive{color:var(--accent)}
.kpi .change.negative{color:var(--red)}
.kpi .change.neutral{color:var(--dim)}

/* Tables */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:10px 12px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover td{background:rgba(34,211,167,.04)}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.72rem;font-weight:600}
.badge-green{background:rgba(34,211,167,.15);color:var(--accent)}
.badge-red{background:rgba(244,91,105,.15);color:var(--red)}
.badge-amber{background:rgba(251,191,36,.15);color:var(--amber)}
.badge-blue{background:rgba(96,165,250,.15);color:var(--blue)}
.badge-purple{background:rgba(167,139,250,.15);color:var(--purple)}

/* Alerts */
.alert-item{padding:10px 14px;border-radius:var(--radius);margin-bottom:8px;font-size:.85rem;border-left:3px solid}
.alert-critical{background:rgba(244,91,105,.08);border-color:var(--red);color:var(--red)}
.alert-high{background:rgba(244,91,105,.06);border-color:var(--red);color:#f8a0a8}
.alert-warning,.alert-medium{background:rgba(251,191,36,.08);border-color:var(--amber);color:var(--amber)}
.alert-low,.alert-info{background:rgba(96,165,250,.08);border-color:var(--blue);color:var(--blue)}

/* Summary bullets */
.summary-card{padding:14px 16px;background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;margin-bottom:8px;font-size:.88rem;line-height:1.5}

/* Chart containers */
.chart-container{position:relative;height:300px;margin-bottom:16px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:768px){.chart-grid{grid-template-columns:1fr}}

/* RCA tree */
.rca-node{padding:10px 14px;margin-bottom:6px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border)}
.rca-node .dim{font-weight:600;color:var(--accent)}
.rca-node .val{color:var(--text)}
.rca-node .contrib{font-family:var(--mono);font-size:.8rem}

/* Scenario cards */
.scenario-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.scenario-card h4{font-size:.95rem;font-weight:600;margin-bottom:8px}
.scenario-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.scenario-meta .item .label{font-size:.7rem;color:var(--dim);text-transform:uppercase}
.scenario-meta .item .val{font-family:var(--mono);font-size:1rem;font-weight:600}

/* Gauge */
.gauge-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.gauge-item{text-align:center;padding:16px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.gauge-item .g-label{font-size:.75rem;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.gauge-item .g-value{font-size:1.4rem;font-weight:700;font-family:var(--mono)}

/* Loading & error */
.loading{text-align:center;padding:40px;color:var(--dim)}
.loading::after{content:'';display:block;width:28px;height:28px;margin:12px auto;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:30px;color:var(--red);font-size:.9rem}
.no-data{text-align:center;padding:30px;color:var(--dim);font-size:.9rem}

/* Section titles */
.section-title{font-size:1rem;font-weight:600;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<div class="header">
  <h1>RPU Analytics Platform</h1>
  <div class="ts" id="hdr-timestamp">Loading...</div>
</div>

<div class="tab-bar" id="tab-bar">
  <button class="tab-btn active" data-tab="overview">Overview</button>
  <button class="tab-btn" data-tab="monitoring">Monitoring</button>
  <button class="tab-btn" data-tab="projections">Projections</button>
  <button class="tab-btn" data-tab="rca">RCA</button>
  <button class="tab-btn" data-tab="insights">Insights</button>
  <button class="tab-btn" data-tab="opportunity">Opportunity</button>
</div>

<div class="main">
  <div class="tab-panel active" id="panel-overview"><div class="loading">Loading overview...</div></div>
  <div class="tab-panel" id="panel-monitoring"><div class="loading">Loading monitoring...</div></div>
  <div class="tab-panel" id="panel-projections"><div class="loading">Loading projections...</div></div>
  <div class="tab-panel" id="panel-rca"><div class="loading">Loading RCA...</div></div>
  <div class="tab-panel" id="panel-insights"><div class="loading">Loading insights...</div></div>
  <div class="tab-panel" id="panel-opportunity"><div class="loading">Loading opportunity...</div></div>
</div>

<script>
// Data layer: lazy load + cache
const DATA_BASE = './data/';
const cache = {};
const chartInstances = {};

async function fetchJSON(name) {
  if (cache[name] !== undefined) return cache[name];
  try {
    const r = await fetch(DATA_BASE + name);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    cache[name] = d;
    return d;
  } catch (e) {
    console.warn('Failed to load ' + name, e);
    cache[name] = null;
    return null;
  }
}

// Helpers
const fmt = (v, dec=2) => v == null ? 'N/A' : Number(v).toFixed(dec);
const fmtPct = (v, dec=1) => v == null ? 'N/A' : Number(v).toFixed(dec) + '%';
const fmtMoney = (v, dec=2) => v == null ? 'N/A' : '$' + Number(v).toFixed(dec);
const arrow = v => v > 0 ? '\u25B2' : v < 0 ? '\u25BC' : '\u25C6';
const changeClass = v => v > 0.01 ? 'positive' : v < -0.01 ? 'negative' : 'neutral';
const esc = s => s == null ? '' : String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');
const noData = () => '<div class="no-data">No data available</div>';

function destroyChart(id) { if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; } }

function makeChart(canvasId, cfg) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return null;
  const c = new Chart(ctx, cfg);
  chartInstances[canvasId] = c;
  return c;
}

const CHART_COLORS = {
  accent: '#22d3a7', accentBg: 'rgba(34,211,167,.15)',
  blue: '#60a5fa', blueBg: 'rgba(96,165,250,.15)',
  red: '#f45b69', redBg: 'rgba(244,91,105,.15)',
  purple: '#a78bfa', purpleBg: 'rgba(167,139,250,.15)',
  amber: '#fbbf24', amberBg: 'rgba(251,191,36,.15)',
  dim: '#8892a4'
};

const CHART_DEFAULTS = {
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { labels: { color: '#e2e8f0', font: { family: 'DM Sans', size: 12 } } },
    tooltip: { backgroundColor: '#1a2332', borderColor: '#1e2d45', borderWidth: 1, titleFont: { family: 'DM Sans' }, bodyFont: { family: 'JetBrains Mono', size: 12 } }
  },
  scales: {
    x: { ticks: { color: '#8892a4', font: { family: 'DM Sans', size: 11 } }, grid: { color: 'rgba(30,45,69,.5)' } },
    y: { ticks: { color: '#8892a4', font: { family: 'JetBrains Mono', size: 11 } }, grid: { color: 'rgba(30,45,69,.5)' } }
  }
};

function mergeDefaults(cfg) {
  cfg.options = cfg.options || {};
  cfg.options.responsive = true;
  cfg.options.maintainAspectRatio = false;
  cfg.options.plugins = Object.assign({}, CHART_DEFAULTS.plugins, cfg.options.plugins || {});
  if (cfg.options.scales !== false) {
    cfg.options.scales = cfg.options.scales || {};
    cfg.options.scales.x = Object.assign({}, CHART_DEFAULTS.scales.x, cfg.options.scales.x || {});
    cfg.options.scales.y = Object.assign({}, CHART_DEFAULTS.scales.y, cfg.options.scales.y || {});
  }
  return cfg;
}

function severityClass(s) {
  s = (s||'').toLowerCase();
  if (s === 'critical') return 'alert-critical';
  if (s === 'high') return 'alert-high';
  if (s === 'warning' || s === 'medium') return 'alert-medium';
  return 'alert-low';
}

function tierBadge(tier) {
  if (!tier) return '';
  const t = tier.toLowerCase();
  if (t.includes('star') || t.includes('1')) return `<span class="badge badge-green">${esc(tier)}</span>`;
  if (t.includes('stable') || t.includes('2')) return `<span class="badge badge-blue">${esc(tier)}</span>`;
  if (t.includes('growing') || t.includes('3')) return `<span class="badge badge-purple">${esc(tier)}</span>`;
  if (t.includes('declining') || t.includes('4')) return `<span class="badge badge-amber">${esc(tier)}</span>`;
  return `<span class="badge badge-red">${esc(tier)}</span>`;
}

function statusBadge(status) {
  if (!status) return '';
  const s = status.toLowerCase();
  if (s.includes('on_track') || s.includes('above')) return `<span class="badge badge-green">${esc(status)}</span>`;
  if (s.includes('below')) return `<span class="badge badge-red">${esc(status)}</span>`;
  if (s.includes('early')) return `<span class="badge badge-amber">${esc(status)}</span>`;
  return `<span class="badge badge-blue">${esc(status)}</span>`;
}

// Tab switching
const loaded = {};
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (!loaded[tab]) { loaded[tab] = true; loaders[tab](); }
});

// Tab loaders
const loaders = {
  overview: loadOverview,
  monitoring: loadMonitoring,
  projections: loadProjections,
  rca: loadRCA,
  insights: loadInsights,
  opportunity: loadOpportunity,
};

// OVERVIEW
async function loadOverview() {
  const panel = document.getElementById('panel-overview');
  const [report, mon] = await Promise.all([fetchJSON('report.json'), fetchJSON('monitoring.json')]);
  let html = '';

  // Executive summary
  const bullets = report?.executive_summary || [];
  if (bullets.length) {
    html += '<div class="section-title">Executive Summary</div>';
    bullets.forEach(b => { html += `<div class="summary-card">${esc(b)}</div>`; });
  }

  // KPI cards
  const kpi = mon?.kpi_summary?.metrics;
  if (kpi) {
    html += '<div class="section-title">Key Performance Indicators</div><div class="kpi-row">';
    const show = ['total_rpu','w1_rpu','blended_ctr','total_enrollments'];
    const labels = { total_rpu:'Total RPU', w1_rpu:'W1 RPU', blended_ctr:'Blended CTR', total_enrollments:'Total Enrollments' };
    const isMoney = { total_rpu:true, w1_rpu:true };
    const isPct = { blended_ctr:true };
    show.forEach(k => {
      const m = kpi[k];
      if (!m) return;
      const v = isMoney[k] ? fmtMoney(m.current) : isPct[k] ? fmtPct(m.current*100) : fmt(m.current,0);
      const wow = m.wow_change_pct;
      html += `<div class="kpi"><div class="label">${labels[k]||k}</div><div class="value">${v}</div>`;
      html += `<div class="change ${changeClass(wow)}">${arrow(wow)} ${fmtPct(wow)} WoW</div></div>`;
    });
    html += '</div>';
  }

  // Alerts
  const alerts = mon?.alerts || [];
  if (alerts.length) {
    html += '<div class="section-title">Active Alerts</div>';
    alerts.forEach(a => {
      const sev = a.severity || 'low';
      const msg = a.message || a.type || 'Alert';
      const detail = a.wow_change_pct != null ? ` (${fmtPct(a.wow_change_pct)} WoW)` :
                     a.z_score != null ? ` (z=${fmt(a.z_score)})` : '';
      html += `<div class="alert-item ${severityClass(sev)}"><strong>${esc(sev.toUpperCase())}</strong> ${esc(msg)}${esc(detail)}</div>`;
    });
  }

  panel.innerHTML = html || noData();
}

// MONITORING
async function loadMonitoring() {
  const panel = document.getElementById('panel-monitoring');
  const mon = await fetchJSON('monitoring.json');
  if (!mon) { panel.innerHTML = noData(); return; }
  let html = '';

  // Full KPI table
  const kpi = mon.kpi_summary?.metrics;
  if (kpi) {
    html += '<div class="section-title">KPI Summary</div><div class="table-wrap"><table><thead><tr><th>Metric</th><th>Current</th><th>Prior</th><th>WoW %</th><th>4W Avg</th><th>vs 4W %</th><th>Trend</th></tr></thead><tbody>';
    Object.entries(kpi).forEach(([k, m]) => {
      html += `<tr><td>${esc(k)}</td><td style="font-family:var(--mono)">${fmt(m.current,4)}</td><td>${fmt(m.prior_week,4)}</td>`;
      html += `<td class="${changeClass(m.wow_change_pct)}">${fmtPct(m.wow_change_pct)}</td>`;
      html += `<td>${fmt(m['4w_avg'],4)}</td><td class="${changeClass(m.vs_4w_pct)}">${fmtPct(m.vs_4w_pct)}</td>`;
      html += `<td>${esc(m.trend||'')}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Waterfall chart
  const wf = mon.waterfall;
  if (wf?.bucket_deltas) {
    html += '<div class="section-title">RPU Waterfall (WoW Change by Component)</div>';
    html += '<div class="card"><div class="chart-container"><canvas id="chart-waterfall"></canvas></div></div>';
  }

  // Touchpoint matrix
  const tp = mon.touchpoint_matrix;
  if (tp && Object.keys(tp).length) {
    html += '<div class="section-title">Touchpoint Matrix</div><div class="table-wrap"><table><thead><tr><th>Touchpoint</th><th>Imp%</th><th>CTR</th><th>RPC</th><th>RPU Contrib</th><th>Conv Rate</th><th>WoW RPU%</th></tr></thead><tbody>';
    Object.entries(tp).forEach(([name, d]) => {
      html += `<tr><td>${esc(name)}</td><td>${fmt(d.imp_pct,4)}</td><td>${fmt(d.ctr,4)}</td><td>${fmtMoney(d.rpc,4)}</td>`;
      html += `<td>${fmtMoney(d.rpu_contribution,4)}</td><td>${fmtPct(d.conversion_rate*100,2)}</td>`;
      const wc = d.wow_changes?.rpu_contribution;
      html += `<td class="${changeClass(wc)}">${fmtPct(wc)}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Affiliate scorecard
  const sc = mon.affiliate_scorecard;
  if (sc && Object.keys(sc).length) {
    const sorted = Object.entries(sc).sort((a,b) => (b[1].total_payout||0) - (a[1].total_payout||0)).slice(0,15);
    html += '<div class="section-title">Affiliate Scorecard (Top 15)</div><div class="table-wrap"><table><thead><tr><th>Affiliate</th><th>Payout</th><th>Share%</th><th>RPU Contrib</th><th>RPC</th><th>RPC Trend%</th><th>Conv Rate</th><th>eCPM</th></tr></thead><tbody>';
    sorted.forEach(([name, d]) => {
      html += `<tr><td>${esc(name)}</td><td>${fmtMoney(d.total_payout)}</td><td>${fmtPct(d.share_of_total)}</td>`;
      html += `<td>${fmtMoney(d.rpu_contribution,4)}</td><td>${fmtMoney(d.rpc_current,4)}</td>`;
      html += `<td class="${changeClass(d.rpc_trend)}">${fmtPct(d.rpc_trend)}</td>`;
      html += `<td>${fmtPct(d.conversion_rate*100,2)}</td><td>${fmtMoney(d.ecpm)}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  panel.innerHTML = html || noData();

  // Render waterfall chart
  if (wf?.bucket_deltas) {
    const labels = Object.keys(wf.bucket_deltas);
    const values = Object.values(wf.bucket_deltas);
    const colors = values.map(v => v >= 0 ? CHART_COLORS.accent : CHART_COLORS.red);
    makeChart('chart-waterfall', mergeDefaults({
      type: 'bar',
      data: { labels, datasets: [{ label: 'RPU Delta', data: values, backgroundColor: colors, borderRadius: 4 }] },
      options: { plugins: { legend: { display: false } } }
    }));
  }
}

// PROJECTIONS
async function loadProjections() {
  const panel = document.getElementById('panel-projections');
  const data = await fetchJSON('rpu_output.json');
  if (!data || !data.rows || !data.rows.length) { panel.innerHTML = noData(); return; }

  const rows = data.rows;
  const latest = rows[rows.length - 1];
  let html = '';

  // KPI cards for latest cohort
  const totalPred = latest['Total Predicted'];
  const totalAct = latest['Total Actual'];
  const delta = latest['Delta (Actual - Predicted)'];
  const deltaPct = latest['Delta %'];

  html += '<div class="kpi-row">';
  html += `<div class="kpi"><div class="label">Total Predicted</div><div class="value">${fmtMoney(totalPred)}</div></div>`;
  html += `<div class="kpi"><div class="label">Total Actual</div><div class="value">${fmtMoney(totalAct)}</div></div>`;
  html += `<div class="kpi"><div class="label">Delta</div><div class="value" style="color:${delta>=0?'var(--accent)':'var(--red)'}">${fmtMoney(delta)}</div></div>`;
  html += `<div class="kpi"><div class="label">Delta %</div><div class="value" style="color:${deltaPct>=0?'var(--accent)':'var(--red)'}">${fmtPct(deltaPct)}</div></div>`;
  html += '</div>';

  // Total RPU chart
  html += '<div class="section-title">Total RPU: Predicted vs Actual</div>';
  html += '<div class="card"><div class="chart-container"><canvas id="chart-total-rpu"></canvas></div></div>';

  // Component charts 2x2
  html += '<div class="section-title">Component Breakdown</div><div class="chart-grid">';
  html += '<div class="card"><div class="chart-container"><canvas id="chart-w1"></canvas></div></div>';
  html += '<div class="card"><div class="chart-container"><canvas id="chart-w2w4"></canvas></div></div>';
  html += '<div class="card"><div class="chart-container"><canvas id="chart-m3"></canvas></div></div>';
  html += '<div class="card"><div class="chart-container"><canvas id="chart-delta-pct"></canvas></div></div>';
  html += '</div>';

  // Cohort detail table (last 12)
  const tableRows = rows.slice(-12);
  html += '<div class="section-title">Weekly Cohort Detail (Last 12)</div><div class="table-wrap"><table><thead><tr>';
  const colKeys = ['feo_cohort','W1 RPU Predicted','W1 RPU Actual','W2-4 RPU Predicted','W2-4 RPU Actual','M3 RPU Predicted','M3 RPU Actual','Total Predicted','Total Actual','Delta (Actual - Predicted)','Delta %'];
  colKeys.forEach(c => { html += `<th>${esc(c)}</th>`; });
  html += '</tr></thead><tbody>';
  tableRows.forEach(r => {
    html += '<tr>';
    colKeys.forEach(c => {
      const v = r[c];
      if (c === 'feo_cohort') html += `<td>${esc(v)}</td>`;
      else if (c === 'Delta %') html += `<td class="${changeClass(v)}">${fmtPct(v)}</td>`;
      else html += `<td style="font-family:var(--mono)">${fmt(v,4)}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  panel.innerHTML = html;

  // Render charts
  const cohorts = rows.map(r => r.feo_cohort || '');
  const shortLabels = cohorts.map(c => { try { return c.split('T')[0].slice(5); } catch(_) { return c; } });

  makeChart('chart-total-rpu', mergeDefaults({
    type: 'line',
    data: {
      labels: shortLabels,
      datasets: [
        { label: 'Predicted', data: rows.map(r => r['Total Predicted']), borderColor: CHART_COLORS.blue, backgroundColor: CHART_COLORS.blueBg, tension: .3, pointRadius: 2 },
        { label: 'Actual', data: rows.map(r => r['Total Actual']), borderColor: CHART_COLORS.accent, backgroundColor: CHART_COLORS.accentBg, tension: .3, pointRadius: 2 }
      ]
    }
  }));

  makeChart('chart-w1', mergeDefaults({
    type: 'line',
    data: {
      labels: shortLabels,
      datasets: [
        { label: 'W1 Predicted', data: rows.map(r => r['W1 RPU Predicted']), borderColor: CHART_COLORS.blue, tension: .3, pointRadius: 2 },
        { label: 'W1 Actual', data: rows.map(r => r['W1 RPU Actual']), borderColor: CHART_COLORS.accent, tension: .3, pointRadius: 2 }
      ]
    },
    options: { plugins: { title: { display: true, text: 'W1 RPU', color: '#e2e8f0' } } }
  }));

  makeChart('chart-w2w4', mergeDefaults({
    type: 'line',
    data: {
      labels: shortLabels,
      datasets: [
        { label: 'W2-4 Predicted', data: rows.map(r => r['W2-4 RPU Predicted']), borderColor: CHART_COLORS.purple, tension: .3, pointRadius: 2 },
        { label: 'W2-4 Actual', data: rows.map(r => r['W2-4 RPU Actual']), borderColor: CHART_COLORS.amber, tension: .3, pointRadius: 2 }
      ]
    },
    options: { plugins: { title: { display: true, text: 'W2-W4 RPU', color: '#e2e8f0' } } }
  }));

  makeChart('chart-m3', mergeDefaults({
    type: 'line',
    data: {
      labels: shortLabels,
      datasets: [
        { label: 'M3 Predicted', data: rows.map(r => r['M3 RPU Predicted']), borderColor: CHART_COLORS.blue, tension: .3, pointRadius: 2 },
        { label: 'M3 Actual', data: rows.map(r => r['M3 RPU Actual']), borderColor: CHART_COLORS.red, tension: .3, pointRadius: 2 }
      ]
    },
    options: { plugins: { title: { display: true, text: 'M3 RPU', color: '#e2e8f0' } } }
  }));

  // Delta % bar chart
  const deltaVals = rows.map(r => r['Delta %']);
  const deltaCols = deltaVals.map(v => v >= 0 ? CHART_COLORS.accent : CHART_COLORS.red);
  makeChart('chart-delta-pct', mergeDefaults({
    type: 'bar',
    data: {
      labels: shortLabels,
      datasets: [{ label: 'Delta %', data: deltaVals, backgroundColor: deltaCols, borderRadius: 3 }]
    },
    options: { plugins: { title: { display: true, text: 'Delta %', color: '#e2e8f0' }, legend: { display: false } } }
  }));
}

// RCA
async function loadRCA() {
  const panel = document.getElementById('panel-rca');
  const rca = await fetchJSON('rca.json');
  if (!rca) { panel.innerHTML = noData(); return; }
  let html = '';

  // Top-down RCA tree
  const td = rca.topdown_rca;
  if (td) {
    html += '<div class="section-title">Top-Down RCA</div>';
    if (td.root_cause_summary) {
      html += `<div class="summary-card">${esc(td.root_cause_summary)}</div>`;
      if (td.confidence) html += `<div style="margin-bottom:12px"><span class="badge badge-${td.confidence==='high'?'green':td.confidence==='medium'?'amber':'red'}">${esc(td.confidence)} confidence</span></div>`;
    }
    const tree = td.rca_tree;
    if (tree && Object.keys(tree).length) {
      Object.entries(tree).forEach(([level, node], i) => {
        const indent = i * 24;
        html += `<div class="rca-node" style="margin-left:${indent}px">`;
        html += `<span class="dim">${esc(level)}</span> &rarr; <span class="dim">${esc(node.dimension)}</span> = <span class="val">${esc(node.top_contributor)}</span>`;
        html += `<div class="contrib" style="margin-top:4px">Contribution: <span style="color:${node.contribution>=0?'var(--accent)':'var(--red)'}">` +
                `${fmt(node.contribution,4)}</span> (${fmtPct(node.share*100)} of change)</div>`;
        // Sub-contributions
        if (node.all_contributions) {
          html += '<div style="margin-top:6px;font-size:.78rem;color:var(--dim)">';
          Object.entries(node.all_contributions).slice(0,8).forEach(([k,v]) => {
            html += `<span style="margin-right:12px">${esc(k)}: <span style="color:${v>=0?'var(--accent)':'var(--red)'};font-family:var(--mono)">${fmt(v,4)}</span></span>`;
          });
          html += '</div>';
        }
        html += '</div>';
      });
    }
  }

  // Cohort maturity
  const mat = rca.cohort_maturity;
  if (mat?.cohorts?.length) {
    html += '<div class="section-title">Cohort Maturity</div><div class="kpi-row">';
    mat.cohorts.forEach(c => {
      const date = c.cohort_date ? c.cohort_date.split('T')[0] : 'N/A';
      html += '<div class="card">';
      html += `<h3>${esc(date)} (${c.maturity_weeks}w)</h3>`;
      html += `<div style="font-family:var(--mono);font-size:1.1rem;margin-bottom:8px">${fmtMoney(c.rpu)}</div>`;
      ['w1','w2w4','m3'].forEach(bucket => {
        const b = c[bucket];
        if (!b) return;
        html += `<div style="margin-bottom:4px;font-size:.82rem">${bucket.toUpperCase()}: ${statusBadge(b.status)}`;
        if (b.percentile != null) html += ` <span style="color:var(--dim)">P${fmt(b.percentile,0)}</span>`;
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
  }

  // Trend analysis
  const tr = rca.trend_analysis;
  if (tr) {
    html += '<div class="section-title">Trend Analysis</div>';
    html += `<div style="margin-bottom:12px">`;
    const cls = tr.classification || 'unknown';
    html += `<span class="badge badge-${cls==='structural'?'red':cls==='concentrated'?'amber':'green'}">${esc(cls)}</span> `;
    html += `<span style="color:var(--dim)">${esc(tr.narrative || '')}</span></div>`;

    if (tr.structural_drivers?.length) {
      html += '<div class="table-wrap"><table><thead><tr><th>Touchpoint</th><th>Lender</th><th>Segment</th><th>Weight</th><th>Imp Slope</th><th>CTR Slope</th><th>RPC Slope</th><th>Contribution</th></tr></thead><tbody>';
      tr.structural_drivers.forEach(d => {
        html += `<tr><td>${esc(d.touchpoint)}</td><td>${esc(d.lender)}</td><td>${esc(d.segment)}</td>`;
        html += `<td>${fmtPct(d.weight*100,2)}</td>`;
        html += `<td>${fmt(d.slopes?.Imp_pct,6)}</td><td>${fmt(d.slopes?.CTR,6)}</td><td>${fmt(d.slopes?.RPC,6)}</td>`;
        html += `<td style="font-family:var(--mono)">${fmt(d.contribution,6)}</td></tr>`;
      });
      html += '</tbody></table></div>';
    }
  }

  panel.innerHTML = html || noData();
}

// INSIGHTS
async function loadInsights() {
  const panel = document.getElementById('panel-insights');
  const ins = await fetchJSON('insights.json');
  if (!ins) { panel.innerHTML = noData(); return; }
  let html = '';

  // Affiliate tier table
  const aff = ins.affiliate_rankings?.lenders;
  if (aff?.length) {
    html += '<div class="section-title">Affiliate Rankings</div><div class="table-wrap"><table><thead><tr><th>Tier</th><th>Lender</th><th>Payout (4W)</th><th>RPU Contrib</th><th>Growth</th><th>RPC Stability</th><th>Best Touchpoint</th></tr></thead><tbody>';
    aff.forEach(r => {
      html += `<tr><td>${tierBadge(r.tier)}</td><td>${esc(r.lender)}</td>`;
      html += `<td>${fmtMoney(r.total_payout_4w)}</td><td>${fmtMoney(r.rpu_contribution,4)}</td>`;
      html += `<td class="${changeClass(r.growth_slope)}">${fmt(r.growth_slope,4)}</td>`;
      html += `<td>${fmt(r.rpc_stability_cv,4)}</td><td>${esc(r.best_touchpoint||'-')}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Concentration
  const conc = ins.concentration;
  if (conc) {
    html += '<div class="section-title">Concentration Risk</div>';
    ['lender','touchpoint'].forEach(dim => {
      const c = conc[dim];
      if (!c) return;
      html += `<h3 style="font-size:.85rem;color:var(--dim);margin:12px 0 8px;text-transform:uppercase">${dim} Concentration</h3>`;
      html += '<div class="gauge-row">';
      html += `<div class="gauge-item"><div class="g-label">HHI</div><div class="g-value" style="color:${c.warning?'var(--red)':'var(--accent)'}">${fmt(c.hhi,4)}</div></div>`;
      html += `<div class="gauge-item"><div class="g-label">Top 3 Share</div><div class="g-value">${fmtPct(c.top_3_share*100)}</div></div>`;
      html += `<div class="gauge-item"><div class="g-label">SPOF Entity</div><div class="g-value" style="font-size:.9rem">${esc(c.spof_risk?.entity||'-')}</div><div style="font-size:.75rem;color:var(--dim)">${fmtPct(c.spof_risk?.share*100)}</div></div>`;
      html += `<div class="gauge-item"><div class="g-label">Direction</div><div class="g-value" style="font-size:.9rem">${esc(c.direction||'-')}</div></div>`;
      html += '</div>';
    });
  }

  // Touchpoint effectiveness
  const tpe = ins.touchpoint_effectiveness?.touchpoints;
  if (tpe?.length) {
    html += '<div class="section-title">Touchpoint Effectiveness</div><div class="table-wrap"><table><thead><tr><th>Touchpoint</th><th>Imp%</th><th>CTR</th><th>RPC</th><th>RPU Contrib</th><th>Conv Rate</th><th>WoW CTR%</th><th>WoW RPC%</th></tr></thead><tbody>';
    tpe.forEach(t => {
      html += `<tr><td>${esc(t.touchpoint)}</td><td>${fmt(t.imp_pct,4)}</td><td>${fmt(t.ctr,4)}</td>`;
      html += `<td>${fmtMoney(t.rpc,4)}</td><td>${fmtMoney(t.rpu_contribution,4)}</td><td>${fmtPct(t.conversion_rate*100,2)}</td>`;
      const wCtr = t.wow_changes?.ctr;
      const wRpc = t.wow_changes?.rpc;
      html += `<td class="${changeClass(wCtr)}">${fmtPct(wCtr*100,2)}</td>`;
      html += `<td class="${changeClass(wRpc)}">${fmtPct(wRpc*100,2)}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Funnel leakage
  const fl = ins.funnel_leakage?.leakages;
  if (fl?.length) {
    html += '<div class="section-title">Funnel Leakage (Top 10 Opportunities)</div>';
    html += `<div style="margin-bottom:12px;font-size:.85rem;color:var(--dim)">Total RPU upside: <strong style="color:var(--accent)">${fmtMoney(ins.funnel_leakage.total_rpu_upside,4)}</strong></div>`;
    html += '<div class="table-wrap"><table><thead><tr><th>Touchpoint</th><th>Lender</th><th>Segment</th><th>Flagged Stages</th><th>Est. RPU Upside</th></tr></thead><tbody>';
    fl.slice(0,10).forEach(l => {
      const stages = (l.flagged_stages||[]).map(s => s.stage).join(', ');
      html += `<tr><td>${esc(l.touchpoint)}</td><td>${esc(l.lender)}</td><td>${esc(l.segment)}</td>`;
      html += `<td>${esc(stages)}</td><td style="color:var(--accent);font-family:var(--mono)">${fmtMoney(l.estimated_rpu_upside,4)}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  panel.innerHTML = html || noData();
}

// OPPORTUNITY
async function loadOpportunity() {
  const panel = document.getElementById('panel-opportunity');
  const opp = await fetchJSON('opportunity.json');
  if (!opp) { panel.innerHTML = noData(); return; }
  let html = '';

  // Scenarios
  const scenarios = opp.scenarios;
  if (scenarios?.length) {
    html += '<div class="section-title">What-If Scenarios</div>';
    scenarios.forEach(s => {
      if (s.error) { html += `<div class="scenario-card"><h4>${esc(s.scenario)}</h4><div class="error-msg">${esc(s.error)}</div></div>`; return; }
      const deltaColor = (s.delta||0) >= 0 ? 'var(--accent)' : 'var(--red)';
      html += `<div class="scenario-card"><h4>${esc(s.scenario)}</h4><div class="scenario-meta">`;
      html += `<div class="item"><div class="label">Current RPU</div><div class="val">${fmtMoney(s.current_total_rpu)}</div></div>`;
      html += `<div class="item"><div class="label">Projected RPU</div><div class="val" style="color:${deltaColor}">${fmtMoney(s.projected_total_rpu)}</div></div>`;
      html += `<div class="item"><div class="label">Delta</div><div class="val" style="color:${deltaColor}">${fmtMoney(s.delta)}</div></div>`;
      html += `<div class="item"><div class="label">Delta %</div><div class="val" style="color:${deltaColor}">${fmtPct(s.delta_pct)}</div></div>`;
      html += `<div class="item"><div class="label">Impact/1K</div><div class="val">${fmtMoney(s.revenue_impact_per_1000_enrolls)}</div></div>`;
      html += '</div></div>';
    });
  }

  // Impression optimizer
  const opt = opp.impression_optimizer;
  if (opt && !opt.error) {
    html += '<div class="section-title">Impression Allocation Optimizer</div>';
    if (opt.projected_rpu_improvement != null) {
      html += `<div style="margin-bottom:12px;font-size:.9rem">Projected RPU improvement: <strong style="color:var(--accent)">${fmtMoney(opt.projected_rpu_improvement,4)}</strong></div>`;
    }
    html += '<div class="card"><div class="chart-container" style="height:350px"><canvas id="chart-optimizer"></canvas></div></div>';
  }

  panel.innerHTML = html || noData();

  // Render optimizer chart
  if (opt && !opt.error && opt.current_allocation && opt.optimal_allocation) {
    const tps = [...new Set([...Object.keys(opt.current_allocation), ...Object.keys(opt.optimal_allocation)])];
    makeChart('chart-optimizer', mergeDefaults({
      type: 'bar',
      data: {
        labels: tps,
        datasets: [
          { label: 'Current', data: tps.map(t => (opt.current_allocation[t]||0)*100), backgroundColor: CHART_COLORS.blueBg, borderColor: CHART_COLORS.blue, borderWidth: 1 },
          { label: 'Optimal', data: tps.map(t => (opt.optimal_allocation[t]||0)*100), backgroundColor: CHART_COLORS.accentBg, borderColor: CHART_COLORS.accent, borderWidth: 1 }
        ]
      },
      options: {
        indexAxis: 'y',
        plugins: { title: { display: true, text: 'Impression Share % (Current vs Optimal)', color: '#e2e8f0' } },
        scales: { x: { title: { display: true, text: 'Share %', color: '#8892a4' } } }
      }
    }));
  }
}
